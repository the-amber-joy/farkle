<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Let&apos;s Farkle</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-4.0.0.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js" defer></script>
  <script src="script.js" defer></script>
</head>

<body>
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h1>Let's Farkle</h1>
    <button id="themeToggle" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: inherit;">🌙</button>
  </div>
  <p>Click the <i data-feather="user-plus"></i> to add a player</p>
  <button id="addPlayer"><i data-feather="user-plus"></i></button>
  <button id="newGame"><i data-feather="refresh-ccw"></i> New Game</button>
  <div id="scores">
    <!-- Player scores will be added here -->
  </div>
</body>

</html>
