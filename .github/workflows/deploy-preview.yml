name: Deploy PR Preview

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: write

concurrency:
  group: gh-pages-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        run: npm run build -- --base /previews/pr-${{ github.event.pull_request.number
          }}/

      - name: Publish preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: dist
          destination_dir: previews/pr-${{ github.event.pull_request.number }}
          keep_files: true
